name: Refresh Dashboard Live Dermato

on:
  schedule:
    - cron: "10 * * * *"   # de hora em hora (captacao ativa)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Rebuild dashboard
        env:
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          META_ADS_TOKEN: ${{ secrets.META_ADS_TOKEN }}
          TZ: America/Sao_Paulo
        run: python refresh.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          if git diff --staged --quiet; then
            echo "Sem mudancas nos dados"
          else
            git commit -m "auto: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
